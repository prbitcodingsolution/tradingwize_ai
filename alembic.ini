[alembic]
# Location of migration scripts
script_location = alembic

# Prepend project root to sys.path so env.py can import project modules
prepend_sys_path = .

# The sqlalchemy.url is NOT hard-coded here — env.py builds it at runtime
# from the same DB_HOST / DB_PORT / DB_NAME / DB_USER / DB_PASSWORD env
# vars that database_utility/database.py already uses.
sqlalchemy.url =

# Timezone for UTC-aware revision timestamps
timezone = UTC

# File template for new revisions: 4-digit sequence + slug, e.g.
# alembic/versions/0003_add_something.py
file_template = %%(rev)s_%%(slug)s
version_locations = %(here)s/alembic/versions
version_path_separator = os

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
